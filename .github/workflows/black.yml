name: Lint
permissions:
  contents: read
  pull-requests: write

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@09d2acae674a48949e3602304ab46fd20ae0c42f
      - uses: psf/black@f4926ace179123942d5713a11196e4a4afae1d2b
        with:
          options: "--check --verbose"
          version: "~= 25.1"
          