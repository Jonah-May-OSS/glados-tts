name: Lint
permissions:
  contents: read
  pull-requests: write

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: psf/black@dd937dcc7e6fd260c87868ed044a29042056cb00
        with:
          options: "--check --verbose"
          version: "~= 25.1"
          